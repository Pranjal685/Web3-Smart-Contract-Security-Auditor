<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token-Guard // Smart Contract Auditor</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <meta name="theme-color" content="#121212">
  <style>
    /* DESIGN SYSTEM: Stark Monochrome & Technical Blue Accent */
    :root {
      --bg-main: #0d0d0d;
      --bg-panel: #141414;
      --bg-console: #0a0a0a;
      --border-color: #222222;
      --border-active: #444444;
      --text-primary: #f2f2f2;
      --text-muted: #777777;
      --accent-color: #2f80ed; /* Technical Blue */
      --accent-hover: #1f6ed4;
      --status-success: #10b981; /* Technical Green */
      --status-error: #ef4444;   /* Technical Red */
      --status-warning: #f59e0b; /* Technical Amber */
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Monaco, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      padding: 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-main);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-active);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 24px;
    }

    .brand {
      font-weight: 700;
      letter-spacing: 1.5px;
    }

    .brand-accent {
      color: var(--accent-color);
    }

    .system-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--text-muted);
      transition: background-color 0.3s ease;
    }

    .status-indicator.active {
      background-color: var(--status-success);
      box-shadow: 0 0 8px var(--status-success);
    }

    .status-indicator.processing {
      background-color: var(--accent-color);
      box-shadow: 0 0 8px var(--accent-color);
      animation: pulse 1.5s infinite ease-in-out;
    }

    .status-indicator.error {
      background-color: var(--status-error);
      box-shadow: 0 0 8px var(--status-error);
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      flex-grow: 1;
    }

    .dashboard-grid > .panel:first-child {
      min-width: 45%;
    }

    @media (max-width: 992px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
      .dashboard-grid > .panel:first-child {
        min-width: 100%;
      }
    }

    .panel {
      background-color: var(--bg-panel);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 20px;
      border-radius: 4px;
    }

    .panel-title {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .editor-container {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      position: relative;
    }

    textarea.solidity-editor {
      width: 100%;
      flex-grow: 1;
      min-height: 450px;
      background-color: var(--bg-console);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      border-radius: 2px;
      overflow-x: auto;
      white-space: pre;
    }

    textarea.solidity-editor:focus {
      border-color: var(--border-active);
    }

    .audit-action-bar {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
    }

    button.audit-btn {
      background-color: var(--accent-color);
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      font-family: var(--font-mono);
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 2px;
      transition: background-color 0.2s ease, opacity 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button.audit-btn:hover {
      background-color: var(--accent-hover);
    }

    button.audit-btn:disabled {
      background-color: var(--border-color);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .console-section {
      display: flex;
      flex-direction: column;
      height: 250px;
      margin-bottom: 20px;
    }

    .console-output {
      flex-grow: 1;
      background-color: var(--bg-console);
      border: 1px solid var(--border-color);
      padding: 12px;
      overflow-y: auto;
      overflow-x: auto;
      font-size: 12px;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-all;
      border-radius: 2px;
    }

    .console-line {
      margin-bottom: 4px;
    }

    .console-line.info {
      color: var(--text-primary);
    }

    .console-line.verbose {
      color: var(--text-muted);
    }

    .console-line.warn {
      color: var(--status-warning);
    }

    .console-line.error {
      color: var(--status-error);
    }

    .report-section {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .report-card {
      flex-grow: 1;
      background-color: var(--bg-console);
      border: 1px solid var(--border-color);
      padding: 16px;
      border-radius: 2px;
      overflow-y: auto;
      overflow-x: auto;
      display: flex;
      flex-direction: column;
      white-space: pre-wrap;
    }

    .report-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-grow: 1;
      color: var(--text-muted);
      text-align: center;
      gap: 8px;
    }

    .report-details {
      display: none;
      flex-direction: column;
      gap: 16px;
      height: 100%;
    }

    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }

    .report-status-badge {
      padding: 4px 8px;
      font-weight: 700;
      font-size: 12px;
      border-radius: 2px;
      text-transform: uppercase;
    }

    .badge-passed {
      background-color: rgba(16, 185, 129, 0.15);
      color: var(--status-success);
      border: 1px solid var(--status-success);
    }

    .badge-failed {
      background-color: rgba(239, 68, 68, 0.15);
      color: var(--status-error);
      border: 1px solid var(--status-error);
    }

    .report-severity {
      font-size: 13px;
    }

    .severity-value {
      font-weight: 700;
    }

    .report-feedback {
      background-color: var(--bg-panel);
      border: 1px solid var(--border-color);
      padding: 12px;
      border-radius: 2px;
      font-size: 13px;
      white-space: pre-wrap;
      overflow-x: auto;
    }

    .report-raw {
      font-size: 11px;
      color: var(--text-muted);
      border: 1px solid var(--border-color);
      padding: 8px;
      background-color: rgba(0, 0, 0, 0.2);
      border-radius: 2px;
      max-height: 120px;
      overflow-y: auto;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border-color);
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      TOKEN-GUARD <span class="brand-accent">//</span> SMART CONTRACT AUDITOR
    </div>
    <div class="system-status">
      <div id="status-dot" class="status-indicator active"></div>
      <span id="status-text">SYSTEM STANDBY</span>
    </div>
  </header>

  <main class="dashboard-grid">
    <!-- Left panel for solidity code input -->
    <section class="panel">
      <div class="panel-title">
        <span>INPUT_SOLIDITY_SOURCE</span>
        <span style="color: var(--text-muted); font-size: 10px;">V0.8.20+</span>
      </div>
      <div class="editor-container">
        <textarea id="solidity-code" class="solidity-editor" spellcheck="false" wrap="off">// SPDX-License-Identifier: MIT
pragma solidity ^0.8.20;

contract VulnerableBank {
    mapping(address => uint256) public balances;

    function deposit() public payable {
        require(msg.value > 0, "Deposit amount must be greater than 0");
        balances[msg.sender] += msg.value;
    }

    function withdraw() public {
        uint256 amount = balances[msg.sender];
        require(amount > 0, "No balance to withdraw");

        // VULNERABILITY: External call before state update (Reentrancy)
        (bool success, ) = msg.sender.call{value: amount}("");
        require(success, "Transfer failed");

        balances[msg.sender] = 0;
    }
}
</textarea>
      </div>
      <div class="audit-action-bar">
        <button id="audit-button" class="audit-btn">AUDIT CONTRACT</button>
      </div>
    </section>

    <!-- Right panel for console outputs and report cards -->
    <section class="panel">
      <div class="panel-title">LIVE_EXECUTION_STREAM</div>
      <div class="console-section">
        <div id="console-output" class="console-output"></div>
      </div>

      <div class="panel-title">FINAL_CRITIC_REPORT</div>
      <div class="report-section">
        <div id="report-card" class="report-card">
          <!-- Placeholder shown initially -->
          <div id="report-placeholder" class="report-placeholder">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <line x1="9" y1="9" x2="15" y2="9"/>
              <line x1="9" y1="13" x2="15" y2="13"/>
              <line x1="9" y1="17" x2="11" y2="17"/>
            </svg>
            <div>No audit performed yet.</div>
          </div>

          <!-- Report detail view -->
          <div id="report-details" class="report-details">
            <div class="report-header">
              <span id="report-status" class="report-status-badge"></span>
              <div class="report-severity">
                SEVERITY: <span id="report-severity-val" class="severity-value"></span>
              </div>
            </div>
            <div class="report-feedback" id="report-feedback"></div>
            <pre class="report-raw" id="report-raw"></pre>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    TOKEN-GUARD AGENTIC ROUTER // SECURE AUDITING SYSTEM
  </footer>

  <script src="/app.js"></script>
</body>
</html>
